<!DOCTYPE html>

<html lang="no">

<head>

<meta charset="UTF-8">

<title>Wheelie Challenge</title>

<style>

body{

margin:0;

overflow:hidden;

background:linear-gradient(skyblue,#88d066);

font-family:Arial;

text-align:center;

}

h1{

margin-top:20px;

}

#score{

font-size:30px;

font-weight:bold;

}

#bike{

position:absolute;

left:50%;

top:60%;

font-size:90px;

transform:translate(-50%,-50%) rotate(0deg);

transition:transform 0.05s;

}

#info{

position:absolute;

bottom:20px;

width:100%;

font-size:22px;

}

</style>

</head>

<body>

<h1>🏍 Wheelie Challenge</h1>

<div id="score">Poeng: 0</div>

<div id="bike">🏍️</div>

<div id="info">Hold fingeren på skjermen!</div>

<script>

let angle=0;

let score=0;

let holding=false;

const bike=document.getElementById("bike");

const scoreBox=document.getElementById("score");

function update(){

if(holding){

angle+=2;

}else{

angle-=1;

}

if(angle<0) angle=0;

bike.style.transform=

`translate(-50%,-50%) rotate(${-angle}deg)`;

if(angle>20 && angle<55){

score++;

scoreBox.innerHTML="Poeng: "+score;

}

if(angle>=60){

alert("Du veltet!\nPoeng: "+score);

score=0;

angle=0;

scoreBox.innerHTML="Poeng: 0";

}

requestAnimationFrame(update);

}

document.body.onpointerdown=()=>{

holding=true;

};

document.body.onpointerup=()=>{

holding=false;

};

update();

</script>

</body>

</html
